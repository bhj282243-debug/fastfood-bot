<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Pizza — Панель управления</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js">
</script>
<style>
/* ═══════════════════════════════════════════════════════════════════════════
   APEX PIZZA — ПРЕМИАЛЬНАЯ АДМИН-ПАНЕЛЬ
   Стиль: Apple × Stripe × Soho House × итальянский ресторан
   ═══════════════════════════════════════════════════════════════════════════ */

:root {
  --copper: #A0785A;
  --copper-light: #C4A682;
  --copper-pale: #F2EBE3;
  --copper-ultra: #F9F4EE;
  --ink: #1A1512;
  --ink-60: #6B605B;
  --ink-30: #B8B0AA;
  --ink-10: #F0EDEA;
  --white: #F5F1EB;
  --surface: #FFFCF9;
  --border: #E8E2DA;
  --green: #2F7A50;
  --green-bg: #EDF6F0;
  --amber: #A8782A;
  --amber-bg: #FCF5E8;
  --red: #B84032;
  --red-bg: #FCF0EE;
  --blue: #2563EB;
  --blue-bg: #EFF5FF;
  --radius: 20px;
  --radius-sm: 12px;
  --radius-xs: 10px;
  --shadow: 0 8px 30px rgba(20,20,20,.04), 0 2px 10px rgba(160,120,90,.06);
  --shadow-md: 0 16px 40px rgba(20,20,20,.07), 0 4px 16px rgba(160,120,90,.1);
  --shadow-lg: 0 32px 64px rgba(20,20,20,.12), 0 8px 24px rgba(160,120,90,.08);
  --transition: 300ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-fast: 180ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-spring: 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--white);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  letter-spacing: -0.01em;
  position: relative;
}

/* Фоновая текстура */
body::before {
  content: '';
  display: block;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, #C4A682 25%, #C4A682 75%, transparent 100%);
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  opacity: 0.5;
}

body::after {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background:
    radial-gradient(ellipse at 15% 30%, rgba(160,120,90,0.02) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 70%, rgba(196,168,130,0.015) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(160,120,90,0.01) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ═══════════════════════════════════════════════════════════════════════════
   LOGIN SCREEN
   ═══════════════════════════════════════════════════════════════════════════ */
#loginScreen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: var(--white);
  position: relative;
  z-index: 1;
}

.login-card {
  width: 100%;
  max-width: 420px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 52px 44px;
  box-shadow: var(--shadow-lg);
  animation: loginSlideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes loginSlideUp {
  from {
    opacity: 0;
    transform: translateY(24px) scale(0.96);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.login-mark {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, var(--ink) 0%, #3D3229 100%);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 28px;
  color: var(--surface);
  box-shadow: 0 4px 16px rgba(26,21,18,0.18);
}

.login-title {
  font-size: 24px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 4px;
  letter-spacing: -0.5px;
}

.login-sub {
  font-size: 13px;
  color: var(--ink-60);
  margin-bottom: 36px;
  font-weight: 450;
}

.field-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--ink-60);
  margin-bottom: 8px;
  display: block;
}

.field-wrap {
  margin-bottom: 18px;
}

.field-input {
  width: 100%;
  height: 50px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-xs);
  padding: 0 18px;
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  color: var(--ink);
  background: var(--surface);
  outline: none;
  transition: all var(--transition-fast);
}

.field-input:hover {
  border-color: #D0C8BE;
}

.field-input:focus {
  border-color: var(--copper);
  box-shadow: 0 0 0 4px rgba(160,120,90,0.08);
}

.btn-primary {
  width: 100%;
  height: 50px;
  background: var(--copper);
  color: white;
  border: none;
  border-radius: var(--radius-xs);
  font-size: 14px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  margin-top: 10px;
  transition: all var(--transition-fast);
  letter-spacing: 0.1px;
  position: relative;
  top: 0;
}

.btn-primary:hover {
  background: #8B6449;
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(139,100,73,0.25);
}

.btn-primary:active {
  transform: translateY(1px);
  box-shadow: none;
}

.login-error {
  font-size: 13px;
  color: var(--red);
  margin-top: 14px;
  display: none;
  text-align: center;
  font-weight: 500;
}

/* ═══════════════════════════════════════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════════════════════════════════════ */
#appScreen {
  display: none;
  padding-top: 1px;
}

.header {
  position: sticky;
  top: 1px;
  background: rgba(248,244,239,0.78);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border-bottom: 1px solid rgba(232,226,218,0.5);
  z-index: 100;
  padding: 0 28px;
}

.header-inner {
  max-width: 1240px;
  margin: 0 auto;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand-icon {
  width: 38px;
  height: 38px;
  background: linear-gradient(135deg, var(--ink) 0%, #3D3229 100%);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--surface);
  box-shadow: 0 2px 10px rgba(26,21,18,0.12);
}

.brand-name {
  font-size: 17px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -0.3px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.live-badge {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11px;
  font-weight: 600;
  color: var(--green);
  background: var(--green-bg);
  padding: 5px 12px;
  border-radius: 20px;
  letter-spacing: 0.5px;
}

.live-dot {
  width: 6px;
  height: 6px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse-green 2s infinite;
}

.sound-btn {
  width: 36px;
  height: 36px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-60);
  transition: all var(--transition-fast);
  position: relative;
  top: 0;
}

.sound-btn:hover {
  border-color: var(--copper);
  color: var(--copper);
  transform: translateY(-1px);
}

.sound-btn:active {
  transform: translateY(1px);
}

.sound-btn.muted {
  color: var(--ink-30);
}

.logout-btn {
  height: 36px;
  padding: 0 16px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: transparent;
  font-size: 12px;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
  color: var(--ink-60);
  cursor: pointer;
  transition: all var(--transition-fast);
  position: relative;
  top: 0;
}

.logout-btn:hover {
  border-color: var(--red);
  color: var(--red);
  transform: translateY(-1px);
}

.logout-btn:active {
  transform: translateY(1px);
}

/* ═══════════════════════════════════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════════════════════════════════ */
.nav-wrap {
  background: rgba(255,252,249,0.6);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(232,226,218,0.4);
  padding: 0 28px;
}

.nav-inner {
  max-width: 1240px;
  margin: 0 auto;
  display: flex;
  gap: 6px;
  padding: 6px 0;
}

.nav-tab {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 22px;
  height: 44px;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-60);
  border: none;
  background: transparent;
  cursor: pointer;
  border-radius: 14px;
  transition: all var(--transition-fast);
  font-family: 'Inter', sans-serif;
  letter-spacing: -0.2px;
}

.nav-tab:hover {
  color: var(--ink);
  background: rgba(160,120,90,0.04);
}

.nav-tab.active {
  color: var(--ink);
  background: var(--surface);
  font-weight: 600;
  box-shadow: var(--shadow);
}

.nav-badge {
  min-width: 18px;
  height: 18px;
  background: var(--copper);
  color: white;
  border-radius: 9px;
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 5px;
  display: none;
}

.nav-badge.visible {
  display: flex;
}

/* ═══════════════════════════════════════════════════════════════════════════
   MAIN CONTENT
   ═══════════════════════════════════════════════════════════════════════════ */
.main {
  max-width: 1240px;
  margin: 0 auto;
  padding: 36px 28px;
  position: relative;
  z-index: 1;
}

.page {
  display: none;
}

.page.active {
  display: block;
}

/* ═══════════════════════════════════════════════════════════════════════════
   STATS CARDS
   ═══════════════════════════════════════════════════════════════════════════ */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 44px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 28px 24px;
  box-shadow: var(--shadow);
  transition: all var(--transition);
  animation: statSlideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
  position: relative;
  overflow: hidden;
  cursor: default;
}

.stat-card::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--copper) 0%, var(--copper-light) 100%);
  opacity: 0;
  transition: opacity var(--transition);
}

.stat-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
}

.stat-card:hover::after {
  opacity: 1;
}

@keyframes statSlideUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.stat-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--ink-60);
  margin-bottom: 16px;
}

.stat-value {
  font-size: 48px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -2px;
  line-height: 1;
  margin-bottom: 6px;
  font-feature-settings: "tnum";
  font-variant-numeric: tabular-nums;
}

.stat-sub {
  font-size: 12px;
  color: var(--ink-60);
  font-weight: 450;
}

/* ═══════════════════════════════════════════════════════════════════════════
   SECTION TITLE
   ═══════════════════════════════════════════════════════════════════════════ */
.section-title {
  font-size: 22px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -0.4px;
  margin-bottom: 20px;
}

/* ═══════════════════════════════════════════════════════════════════════════
   FILTER BUTTONS
   ═══════════════════════════════════════════════════════════════════════════ */
.filters {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}

.filter-btn {
  height: 36px;
  padding: 0 16px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: transparent;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-60);
  cursor: pointer;
  transition: all var(--transition-fast);
  font-family: 'Inter', sans-serif;
  white-space: nowrap;
  position: relative;
  top: 0;
}

.filter-btn:hover {
  border-color: var(--copper);
  color: var(--copper);
  transform: translateY(-1px);
}

.filter-btn:active {
  transform: translateY(1px);
}

.filter-btn.active {
  background: var(--copper);
  border-color: var(--copper);
  color: white;
  font-weight: 600;
}

/* ═══════════════════════════════════════════════════════════════════════════
   ORDER CARDS
   ═══════════════════════════════════════════════════════════════════════════ */
.orders-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.order-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 26px;
  box-shadow: var(--shadow);
  border-left: 4px solid transparent;
  transition: all var(--transition);
  cursor: pointer;
  animation: orderSlideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) both;
  position: relative;
  overflow: hidden;
}

.order-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
}

@keyframes orderSlideUp {
  from {
    opacity: 0;
    transform: translateY(14px) scale(0.98);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.order-card.status-new {
  border-left-color: var(--copper);
}

.order-card.status-accepted {
  border-left-color: var(--blue);
}

.order-card.status-preparing {
  border-left-color: var(--amber);
}

.order-card.status-ready {
  border-left-color: var(--green);
}

.order-card.status-delivering {
  border-left-color: #7C3AED;
}

.order-card.status-completed {
  border-left-color: var(--ink-30);
}

.order-card.status-cancelled {
  border-left-color: var(--red);
}

.order-card.is-new-pulse::after {
  content: '';
  position: absolute;
  top: 14px;
  right: 14px;
  width: 8px;
  height: 8px;
  background: var(--copper);
  border-radius: 50%;
  animation: pulse-dot 1.2s ease infinite;
}

.order-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.order-id {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.3px;
}

.order-time {
  font-size: 11px;
  color: var(--ink-60);
  font-weight: 450;
}

.order-customer {
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 4px;
  letter-spacing: -0.2px;
}

.order-details {
  font-size: 12px;
  color: var(--ink-60);
  margin-bottom: 14px;
  line-height: 1.5;
}

.order-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.order-total {
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.4px;
}

.status-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 20px;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  transition: all var(--transition);
}

.badge-new {
  background: var(--copper-pale);
  color: var(--copper);
}

.badge-accepted {
  background: var(--blue-bg);
  color: var(--blue);
}

.badge-preparing {
  background: var(--amber-bg);
  color: var(--amber);
}

.badge-ready {
  background: var(--green-bg);
  color: var(--green);
}

.badge-delivering {
  background: #F3E8FF;
  color: #7C3AED;
}

.badge-completed {
  background: var(--ink-10);
  color: var(--ink-60);
}

.badge-cancelled {
  background: var(--red-bg);
  color: var(--red);
}

/* ═══════════════════════════════════════════════════════════════════════════
   EMPTY STATE
   ═══════════════════════════════════════════════════════════════════════════ */
.empty-state {
  text-align: center;
  padding: 80px 24px;
  color: var(--ink-60);
}

.empty-icon {
  width: 64px;
  height: 64px;
  margin: 0 auto 20px;
  color: var(--ink-30);
  opacity: 0.6;
}

.empty-title {
  font-size: 17px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 8px;
  letter-spacing: -0.3px;
}

.empty-sub {
  font-size: 13px;
  color: var(--ink-60);
  font-weight: 450;
}

/* ═══════════════════════════════════════════════════════════════════════════
   SKELETON
   ═══════════════════════════════════════════════════════════════════════════ */
.skeleton {
  background: linear-gradient(90deg, var(--ink-10) 25%, #EBE4DC 50%, var(--ink-10) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.6s infinite;
  border-radius: 8px;
}

.skeleton-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 26px;
  margin-bottom: 14px;
}

/* ═══════════════════════════════════════════════════════════════════════════
   MENU PAGE
   ═══════════════════════════════════════════════════════════════════════════ */
.menu-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 14px;
}

.btn-outline {
  height: 42px;
  padding: 0 20px;
  border: 1.5px solid var(--copper);
  border-radius: var(--radius-xs);
  background: transparent;
  color: var(--copper);
  font-size: 13px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all var(--transition-fast);
  display: flex;
  align-items: center;
  gap: 7px;
  position: relative;
  top: 0;
}

.btn-outline:hover {
  background: var(--copper);
  color: white;
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(160,120,90,0.2);
}

.btn-outline:active {
  transform: translateY(1px);
  box-shadow: none;
}

.btn-solid {
  height: 42px;
  padding: 0 20px;
  border: none;
  border-radius: var(--radius-xs);
  background: var(--copper);
  color: white;
  font-size: 13px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all var(--transition-fast);
  display: flex;
  align-items: center;
  gap: 7px;
  position: relative;
  top: 0;
}

.btn-solid:hover {
  background: #8B6449;
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(139,100,73,0.25);
}

.btn-solid:active {
  transform: translateY(1px);
  box-shadow: none;
}

.btn-group {
  display: flex;
  gap: 10px;
}

.category-block {
  margin-bottom: 36px;
}

.category-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--ink-60);
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}

.product-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: flex-start;
  gap: 16px;
  transition: all var(--transition);
  animation: productSlideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) both;
}

.product-card:hover {
  transform: translateY(-3px);

<!-- ═══════════════════════════════════════════════════════════════════════════
     JAVASCRIPT (100% сохранён)
     ═══════════════════════════════════════════════════════════════════════════ -->
<script>
const API = '';
let token = localStorage.getItem('ff_token') || '';
let allOrders = [];
let currentFilter = 'all';
let currentOrderId = null;
let autoRefresh = null;
let soundEnabled = localStorage.getItem('ff_sound') !== 'false';
let prevNewCount = 0;
let categories = [];

// ── AUDIO ──
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playNotif() {
  if (!soundEnabled) return;
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.setValueAtTime(880, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1100, audioCtx.currentTime + 0.1);
    g.gain.setValueAtTime(0.08, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
    o.start(); o.stop(audioCtx.currentTime + 0.4);
  } catch(e) {}
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  localStorage.setItem('ff_sound', soundEnabled);
  const btn = document.getElementById('soundBtn');
  btn.classList.toggle('muted', !soundEnabled);
  btn.innerHTML = soundEnabled
    ? '<i data-lucide="volume-2" style="width:14px;height:14px"></i>'
    : '<i data-lucide="volume-x" style="width:14px;height:14px"></i>';
  lucide.createIcons();
}

// ── TIME ──
function timeAgo(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'только что';
  if (diff < 3600) return Math.floor(diff/60) + ' мин назад';
  if (diff < 86400) return Math.floor(diff/3600) + ' ч назад';
  return d.toLocaleDateString('ru');
}

// ── ANIMATE NUMBER ──
function animateNum(el, target) {
  const start = 0;
  const dur = 800;
  const t0 = performance.now();
  const fmt = n => n >= 1000 ? (n/1000).toFixed(0)+'K' : n;
  function step(t) {
    const p = Math.min((t - t0) / dur, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    el.textContent = fmt(Math.round(start + (target - start) * ease));
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ── AUTH ──
async function doLogin() {
  const u = document.getElementById('loginUser').value;
  const p = document.getElementById('loginPass').value;
  const err = document.getElementById('loginErr');
  err.style.display = 'none';
  try {
    const fd = new FormData();
    fd.append('username', u);
    fd.append('password', p);
    const r = await fetch(`${API}/api/login`, { method: 'POST', body: fd });
    if (!r.ok) throw new Error();
    const d = await r.json();
    token = d.access_token;
    localStorage.setItem('ff_token', token);
    showApp();
  } catch { err.style.display = 'block'; }
}

function doLogout() {
  token = '';
  localStorage.removeItem('ff_token');
  clearInterval(autoRefresh);
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

// ── INIT ──
function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  lucide.createIcons();
  loadOrders();
  loadMenu();
  autoRefresh = setInterval(() => {
    loadOrders();
  }, 15000);
  if (!soundEnabled) {
    document.getElementById('soundBtn').classList.add('muted');
    document.getElementById('soundBtn').innerHTML = '<i data-lucide="volume-x" style="width:14px;height:14px"></i>';
    lucide.createIcons();
  }
}

if (token) showApp();

// ── KEYBOARD SHORTCUTS ──
document.addEventListener('keydown', e => {
  if (e.key === '1') showPage('orders', document.querySelector('[data-page=orders]'));
  if (e.key === '2') showPage('menu', document.querySelector('[data-page=menu]'));
  if (e.key === '3') showPage('stats', document.querySelector('[data-page=stats]'));
  if (e.key === 'Escape') {
    closeModal('order'); closeModal('category'); closeModal('product');
  }
});

// ── NAVIGATION ──
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'stats') renderStats();
}

// ── ORDERS ──
function showSkeleton() {
  const list = document.getElementById('ordersList');
  list.innerHTML = [1,2,3].map(() => `
    <div class="skeleton-card">
      <div class="skeleton" style="height:12px;width:30%;margin-bottom:12px"></div>
      <div class="skeleton" style="height:14px;width:60%;margin-bottom:8px"></div>
      <div class="skeleton" style="height:12px;width:40%"></div>
    </div>
  `).join('');
}

async function loadOrders() {
  if (!token) return;
  if (allOrders.length === 0) showSkeleton();
  try {
    const r = await fetch(`${API}/api/orders`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!r.ok) { if (r.status === 401) doLogout(); return; }
    const data = await r.json();

    const newCount = data.filter(o => o.status === 'new').length;
    if (newCount > prevNewCount && allOrders.length > 0) playNotif();
    prevNewCount = newCount;

    const badge = document.getElementById('newOrdersBadge');
    badge.textContent = newCount;
    badge.classList.toggle('visible', newCount > 0);

    allOrders = data;
    renderOrders();
    renderStats();
  } catch(e) {}
}

function renderOrders() {
  const list = document.getElementById('ordersList');
  const filtered = currentFilter === 'all'
    ? allOrders
    : allOrders.filter(o => o.status === currentFilter);

  if (!filtered.length) {
    list.innerHTML = `
      <div class="empty-state">
        <svg class="empty-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="12" y="8" width="40" height="48" rx="4"/>
          <line x1="22" y1="22" x2="42" y2="22"/>
          <line x1="22" y1="30" x2="42" y2="30"/>
          <line x1="22" y1="38" x2="34" y2="38"/>
        </svg>
        <div class="empty-title">Заказов нет</div>
        <div class="empty-sub">Новые заказы появятся здесь</div>
      </div>`;
    return;
  }

  const statusMap = {
    new: ['badge-new','Новый'],
    accepted: ['badge-accepted','Принят'],
    preparing: ['badge-preparing','Готовится'],
    ready: ['badge-ready','Готов'],
    delivering: ['badge-delivering','Доставляется'],
    completed: ['badge-completed','Выполнен'],
    cancelled: ['badge-cancelled','Отменён']
  };

  const now = Date.now();
  list.innerHTML = filtered.map((o, i) => {
    const [badgeClass, badgeText] = statusMap[o.status] || ['badge-new','Новый'];
    const created = new Date(o.created_at);
    const isRecentNew = o.status === 'new' && (now - created.getTime()) < 10000;
    const items = o.items || [];
    const itemsText = items.slice(0,2).map(it => it.product?.name || '').filter(Boolean).join(', ') + (items.length > 2 ? ` +${items.length-2}` : '');
    return `
      <div class="order-card status-${o.status} ${isRecentNew ? 'is-new-pulse' : ''}"
           style="animation-delay:${i*40}ms"
           onclick="openOrder(${o.id})">
        <div class="order-header">
          <span class="order-id">Заказ #${o.id}</span>
          <span class="order-time">${timeAgo(o.created_at)}</span>
        </div>
        <div class="order-customer">${o.customer_name || 'Гость'}</div>
        <div class="order-details">${o.phone || ''} ${itemsText ? '· ' + itemsText : ''}</div>
        <div class="order-footer">
          <span class="order-total">${(o.total_price||0).toLocaleString()} сум</span>
          <span class="status-badge ${badgeClass}">${badgeText}</span>
        </div>
      </div>`;
  }).join('');
}

function filterOrders(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

// ── ORDER DETAIL ──
function openOrder(id) {
  const o = allOrders.find(x => x.id === id);
  if (!o) return;
  currentOrderId = id;
  const statusNames = {
    new:'Новый', accepted:'Принят', preparing:'Готовится',
    ready:'Готов', delivering:'Доставляется', completed:'Выполнен', cancelled:'Отменён'
  };
  document.getElementById('orderModalTitle').textContent = `Заказ #${o.id}`;
  document.getElementById('orderModalInfo').innerHTML = `
    <div class="order-info-row"><span class="order-info-key">Клиент</span><span class="order-info-val">${o.customer_name||'—'}</span></div>
    <div class="order-info-row"><span class="order-info-key">Телефон</span><span class="order-info-val">${o.phone||'—'}</span></div>
    <div class="order-info-row"><span class="order-info-key">Доставка</span><span class="order-info-val">${o.delivery_type==='delivery'?'Доставка':'Самовывоз'}</span></div>
    ${o.address ? `<div class="order-info-row"><span class="order-info-key">Адрес</span><span class="order-info-val">${o.address}</span></div>` : ''}
    ${o.comment ? `<div class="order-info-row"><span class="order-info-key">Комментарий</span><span class="order-info-val">${o.comment}</span></div>` : ''}
    <div class="order-info-row"><span class="order-info-key">Оплата</span><span class="order-info-val">${o.payment_method||'—'}</span></div>
  `;
  const items = o.items || [];
  document.getElementById('orderModalItems').innerHTML = `
    <div style="font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--ink-60);margin-bottom:8px">Состав</div>
    ${items.map(it => `
      <div class="order-item-row">
        <span>${it.product?.name||'Блюдо'} × ${it.quantity}</span>
        <span style="font-weight:600">${((it.price||0)*it.quantity).toLocaleString()} сум</span>
      </div>`).join('')}
    <div class="order-item-row" style="font-weight:700;font-size:14px">
      <span>Итого</span>
      <span>${(o.total_price||0).toLocaleString()} сум</span>
    </div>
  `;
  document.getElementById('orderStatusSelect').value = o.status;
  document.getElementById('orderModal').classList.add('open');
}

async function saveOrderStatus() {
  const status = document.getElementById('orderStatusSelect').value;
  try {
    const r = await fetch(`${API}/api/orders/${currentOrderId}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ status })
    });
    if (r.ok) { closeModal('order'); loadOrders(); }
  } catch(e) {}
}

// ── MENU ──
async function loadMenu() {
  try {
    const r = await fetch(`${API}/api/menu`);
    const data = await r.json();
    categories = data;
    renderMenu(data);
    const sel = document.getElementById('prodCat');
    sel.innerHTML = data.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  } catch(e) {}
}

function renderMenu(data) {
  const el = document.getElementById('menuList');
  if (!data.length) {
    el.innerHTML = `
      <div class="empty-state">
        <svg class="empty-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="32" cy="32" r="20"/>
          <line x1="32" y1="22" x2="32" y2="42"/>
          <line x1="22" y1="32" x2="42" y2="32"/>
        </svg>
        <div class="empty-title">Меню пусто</div>
        <div class="empty-sub">Добавьте категорию, затем блюда</div>
      </div>`;
    return;
  }
  el.innerHTML = data.map((cat, ci) => `
    <div class="category-block" style="animation-delay:${ci*60}ms">
      <div class="category-title">
        <span>${cat.name}</span>
        <button class="icon-btn danger" onclick="deleteCategory(${cat.id})" title="Удалить категорию">
          <i data-lucide="trash-2" style="width:12px;height:12px"></i>
        </button>
      </div>
      <div class="products-grid">
        ${(cat.products||[]).map((p, pi) => `
          <div class="product-card" style="animation-delay:${(ci*5+pi)*40}ms">
            <div class="product-img">
              ${p.image_url ? `<img src="${p.image_url}" alt="${p.name}" onerror="this.parentElement.innerHTML='<i data-lucide=\\"utensils\\" style=\\"width:20px;height:20px\\"></i>';lucide.createIcons()">` :
              '<i data-lucide="utensils" style="width:20px;height:20px"></i>'}
            </div>
            <div class="product-info">
              <div class="product-name">${p.name}</div>
              <div class="product-desc">${p.description||''}</div>
              <div class="product-footer">
                <span class="product-price">${(p.price||0).toLocaleString()} сум</span>
                <div class="product-actions">
                  <button class="icon-btn danger" onclick="deleteProduct(${p.id})" title="Удалить">
                    <i data-lucide="trash-2" style="width:12px;height:12px"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
  lucide.createIcons();
}

// ── STATS ──
function renderStats() {
  const total = allOrders.length;
  const revenue = allOrders.filter(o => o.status === 'completed').reduce((s,o) => s + (o.total_price||0), 0);
  const newC = allOrders.filter(o => o.status === 'new').length;
  const completed = allOrders.filter(o => o.status === 'completed').length;
  const today = allOrders.filter(o => {
    const d = new Date(o.created_at);
    const n = new Date();
    return d.toDateString() === n.toDateString();
  }).length;

  animateNum(document.getElementById('statTotal'), total);
  animateNum(document.getElementById('statRevenue'), Math.round(revenue/1000));
  document.querySelector('#statRevenue').nextElementSibling.textContent = 'тыс. сум';
  animateNum(document.getElementById('statNew'), newC);
  animateNum(document.getElementById('statCompleted'), completed);
  animateNum(document.getElementById('statToday'), today);
}

// ── MODALS ──
function openModal(type) {
  if (type === 'category') {
    document.getElementById('catName').value = '';
    document.getElementById('catSort').value = '0';
    document.getElementById('categoryModal').classList.add('open');
  } else if (type === 'product') {
    document.getElementById('prodName').value = '';
    document.getElementById('prodDesc').value = '';
    document.getElementById('prodPrice').value = '';
    document.getElementById('prodImg').value = '';
    document.getElementById('productModal').classList.add('open');
  }
}

function closeModal(type) {
  document.getElementById(type + 'Modal').classList.remove('open');
  if (type === 'order') currentOrderId = null;
}

// ── SAVE CATEGORY ──
async function saveCategory() {
  const name = document.getElementById('catName').value.trim();
  const sort = parseInt(document.getElementById('catSort').value) || 0;
  if (!name) return;
  try {
    const r = await fetch(`${API}/api/categories`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ name, sort_order: sort, is_active: true })
    });
    if (r.ok) { closeModal('category'); loadMenu(); }
  } catch(e) {}
}

// ── SAVE PRODUCT ──
async function saveProduct() {
  const name = document.getElementById('prodName').value.trim();
  const desc = document.getElementById('prodDesc').value.trim();
  const price = parseFloat(document.getElementById('prodPrice').value) || 0;
  const img = document.getElementById('prodImg').value.trim();
  const catId = parseInt(document.getElementById('prodCat').value);
  if (!name || !catId) return;
  try {
    const r = await fetch(`${API}/api/products`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({
        name, description: desc, price,
        image_url: img || null,
        category_id: catId,
        is_available: true,
        is_popular: false,
        sort_order: 0,
        options: []
      })
    });
    if (r.ok) { closeModal('product'); loadMenu(); }
  } catch(e) {}
}

// ── DELETE ──
async function deleteCategory(id) {
  if (!confirm('Удалить категорию?')) return;
  try {
    await fetch(`${API}/api/categories/${id}`, {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${token}` }
    });
    loadMenu();
  } catch(e) {}
}

async function deleteProduct(id) {
  if (!confirm('Удалить блюдо?')) return;
  try {
    await fetch(`${API}/api/products/${id}`, {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${token}` }
    });
    loadMenu();
  } catch(e) {}
}

// Enter key for login
document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
