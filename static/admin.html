<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastFood Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
:root {
  --copper: #A0785A;
  --copper-light: #C4997A;
  --copper-pale: #F0E8E0;
  --copper-ultra: #FAF5F1;
  --ink: #1A1512;
  --ink-60: #7A6E68;
  --ink-30: #C4BCB8;
  --ink-10: #F0EDEB;
  --white: #FDFCFB;
  --surface: #FFFFFF;
  --border: #EAE4DF;
  --green: #2D7A4F;
  --green-bg: #EBF5EF;
  --amber: #B07A20;
  --amber-bg: #FDF3E0;
  --red: #C0392B;
  --red-bg: #FDECEA;
  --blue: #2563EB;
  --blue-bg: #EFF6FF;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 2px 20px rgba(160,120,90,0.08);
  --shadow-md: 0 8px 40px rgba(160,120,90,0.12);
  --transition: 200ms cubic-bezier(0.4,0,0.2,1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--white);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── TOP ACCENT LINE ── */
body::before {
  content: '';
  display: block;
  height: 2px;
  background: linear-gradient(90deg, var(--copper) 0%, var(--copper-light) 50%, transparent 100%);
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
}

/* ── LOGIN ── */
#loginScreen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: var(--white);
}

.login-card {
  width: 100%;
  max-width: 400px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 48px 40px;
  box-shadow: var(--shadow-md);
  animation: slideUp 0.4s ease;
}

.login-mark {
  width: 56px; height: 56px;
  background: var(--copper-pale);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 24px;
  color: var(--copper);
}

.login-title {
  font-size: 22px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 4px;
  letter-spacing: -0.3px;
}

.login-sub {
  font-size: 13px;
  color: var(--ink-60);
  margin-bottom: 32px;
}

.field-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--ink-60);
  margin-bottom: 6px;
  display: block;
}

.field-wrap { margin-bottom: 16px; }

.field-input {
  width: 100%;
  height: 48px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0 16px;
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  color: var(--ink);
  background: var(--white);
  outline: none;
  transition: border-color var(--transition);
}

.field-input:focus { border-color: var(--copper); }

.btn-primary {
  width: 100%;
  height: 48px;
  background: var(--copper);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  margin-top: 8px;
  transition: all var(--transition);
  letter-spacing: 0.2px;
}

.btn-primary:hover { background: #8B6449; transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }

.login-error {
  font-size: 13px;
  color: var(--red);
  margin-top: 12px;
  display: none;
  text-align: center;
}

/* ── APP ── */
#appScreen { display: none; padding-top: 2px; }

/* ── HEADER ── */
.header {
  position: sticky; top: 2px;
  background: rgba(253,252,251,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  z-index: 100;
  padding: 0 24px;
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-icon {
  width: 32px; height: 32px;
  background: var(--copper-pale);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: var(--copper);
}

.brand-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -0.2px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 600;
  color: var(--green);
  background: var(--green-bg);
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.4px;
}

.live-dot {
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse-green 2s infinite;
}

.sound-btn {
  width: 34px; height: 34px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-60);
  transition: all var(--transition);
}

.sound-btn:hover { border-color: var(--copper); color: var(--copper); }
.sound-btn.muted { color: var(--ink-30); }

.logout-btn {
  height: 34px;
  padding: 0 14px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: transparent;
  font-size: 12px;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
  color: var(--ink-60);
  cursor: pointer;
  transition: all var(--transition);
}

.logout-btn:hover { border-color: var(--red); color: var(--red); }

/* ── NAV TABS ── */
.nav-wrap {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
}

.nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  gap: 0;
}

.nav-tab {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 20px;
  height: 48px;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-60);
  border: none;
  background: transparent;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all var(--transition);
  font-family: 'Inter', sans-serif;
}

.nav-tab:hover { color: var(--ink); }
.nav-tab.active { color: var(--copper); border-bottom-color: var(--copper); }

.nav-badge {
  min-width: 18px; height: 18px;
  background: var(--copper);
  color: white;
  border-radius: 9px;
  font-size: 10px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  padding: 0 5px;
  display: none;
}

.nav-badge.visible { display: flex; }

/* ── MAIN ── */
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 24px;
}

.page { display: none; }
.page.active { display: block; }

/* ── STATS ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 40px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  transition: transform var(--transition), box-shadow var(--transition);
  animation: slideUp 0.4s ease both;
}

.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

.stat-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--ink-60);
  margin-bottom: 12px;
}

.stat-value {
  font-size: 40px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -1.5px;
  line-height: 1;
  margin-bottom: 4px;
}

.stat-sub {
  font-size: 12px;
  color: var(--ink-60);
}

/* ── SECTION TITLE ── */
.section-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -0.3px;
  margin-bottom: 16px;
}

/* ── FILTERS ── */
.filters {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.filter-btn {
  height: 34px;
  padding: 0 14px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: transparent;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-60);
  cursor: pointer;
  transition: all var(--transition);
  font-family: 'Inter', sans-serif;
  white-space: nowrap;
}

.filter-btn:hover { border-color: var(--copper); color: var(--copper); }
.filter-btn.active { background: var(--copper); border-color: var(--copper); color: white; }

/* ── ORDERS LIST ── */
.orders-list { display: flex; flex-direction: column; gap: 12px; }

.order-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  border-left: 3px solid transparent;
  transition: all var(--transition);
  cursor: pointer;
  animation: slideUp 0.3s ease both;
  position: relative;
  overflow: hidden;
}

.order-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.order-card.status-new { border-left-color: var(--copper); }
.order-card.status-accepted { border-left-color: var(--blue); }
.order-card.status-preparing { border-left-color: var(--amber); }
.order-card.status-ready { border-left-color: var(--green); }
.order-card.status-delivering { border-left-color: #7C3AED; }
.order-card.status-completed { border-left-color: var(--ink-30); }
.order-card.status-cancelled { border-left-color: var(--red); }

.order-card.is-new-pulse::after {
  content: '';
  position: absolute;
  top: 12px; right: 12px;
  width: 8px; height: 8px;
  background: var(--copper);
  border-radius: 50%;
  animation: pulse-dot 1s ease infinite;
}

.order-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.order-id {
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.2px;
}

.order-time {
  font-size: 11px;
  color: var(--ink-60);
}

.order-customer {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 4px;
}

.order-details {
  font-size: 12px;
  color: var(--ink-60);
  margin-bottom: 12px;
}

.order-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.order-total {
  font-size: 16px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.3px;
}

.status-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.3px;
}

.badge-new { background: var(--copper-pale); color: var(--copper); }
.badge-accepted { background: var(--blue-bg); color: var(--blue); }
.badge-preparing { background: var(--amber-bg); color: var(--amber); }
.badge-ready { background: var(--green-bg); color: var(--green); }
.badge-delivering { background: #F3E8FF; color: #7C3AED; }
.badge-completed { background: var(--ink-10); color: var(--ink-60); }
.badge-cancelled { background: var(--red-bg); color: var(--red); }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 80px 24px;
  color: var(--ink-60);
}

.empty-icon {
  width: 64px; height: 64px;
  margin: 0 auto 20px;
  color: var(--ink-30);
}

.empty-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 8px;
}

.empty-sub { font-size: 13px; color: var(--ink-60); }

/* ── SKELETON ── */
.skeleton {
  background: linear-gradient(90deg, var(--ink-10) 25%, #E8E2DC 50%, var(--ink-10) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 6px;
}

.skeleton-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
}

/* ── MENU ── */
.menu-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}

.btn-outline {
  height: 40px;
  padding: 0 18px;
  border: 1.5px solid var(--copper);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--copper);
  font-size: 13px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all var(--transition);
  display: flex; align-items: center; gap: 6px;
}

.btn-outline:hover { background: var(--copper); color: white; transform: translateY(-1px); }
.btn-outline:active { transform: translateY(0); }

.btn-solid {
  height: 40px;
  padding: 0 18px;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--copper);
  color: white;
  font-size: 13px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all var(--transition);
  display: flex; align-items: center; gap: 6px;
}

.btn-solid:hover { background: #8B6449; transform: translateY(-1px); }
.btn-solid:active { transform: translateY(0); }

.btn-group { display: flex; gap: 8px; }

.category-block { margin-bottom: 32px; }

.category-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--ink-60);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}

.product-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: flex-start;
  gap: 12px;
  transition: all var(--transition);
  animation: slideUp 0.3s ease both;
}

.product-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

.product-img {
  width: 56px; height: 56px;
  background: var(--copper-pale);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: var(--copper);
  flex-shrink: 0;
  overflow: hidden;
}

.product-img img { width: 100%; height: 100%; object-fit: cover; }

.product-info { flex: 1; min-width: 0; }

.product-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.product-desc {
  font-size: 11px;
  color: var(--ink-60);
  margin-bottom: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.product-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.product-price {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
}

.product-actions { display: flex; gap: 6px; }

.icon-btn {
  width: 30px; height: 30px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-60);
  transition: all var(--transition);
}

.icon-btn:hover { border-color: var(--copper); color: var(--copper); }
.icon-btn.danger:hover { border-color: var(--red); color: var(--red); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(26,21,18,0.5);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.modal-overlay.open {
  display: flex;
  animation: fadeIn 0.2s ease;
}

.modal {
  background: var(--surface);
  border-radius: 24px;
  padding: 32px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.2);
  animation: modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
  max-height: 90vh;
  overflow-y: auto;
}

.modal-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 24px;
  letter-spacing: -0.3px;
}

.modal-footer {
  display: flex;
  gap: 10px;
  margin-top: 24px;
}

.modal-footer .btn-outline { flex: 1; justify-content: center; }
.modal-footer .btn-solid { flex: 1; justify-content: center; }

/* ── ORDER MODAL ── */
.order-modal-info { margin-bottom: 20px; }

.order-info-row {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

.order-info-row:last-child { border-bottom: none; }
.order-info-key { color: var(--ink-60); }
.order-info-val { font-weight: 500; color: var(--ink); }

.order-items-list { margin: 16px 0; }

.order-item-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}

.order-item-row:last-child { border-bottom: none; }

.status-select {
  width: 100%;
  height: 48px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0 16px;
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  color: var(--ink);
  background: var(--white);
  outline: none;
  margin-top: 16px;
  cursor: pointer;
}

.status-select:focus { border-color: var(--copper); }

/* ── ANIMATIONS ── */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes shimmer {
  from { background-position: 200% 0; }
  to { background-position: -200% 0; }
}

@keyframes pulse-green {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

@keyframes pulse-dot {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.4); opacity: 0.7; }
}

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  .header-inner { padding: 0; }
  .main { padding: 20px 16px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .stat-card { padding: 18px 16px; }
  .stat-value { font-size: 32px; }
  .products-grid { grid-template-columns: 1fr; }
  .nav-tab { padding: 0 12px; font-size: 12px; }
  .modal { padding: 24px 20px; }
  .login-card { padding: 36px 24px; }
}

@media (min-width: 1024px) {
  .stats-grid { grid-template-columns: repeat(5, 1fr); }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-mark">
      <i data-lucide="utensils" style="width:24px;height:24px"></i>
    </div>
    <div class="login-title">Добро пожаловать</div>
    <div class="login-sub">Панель управления рестораном</div>
    <div class="field-wrap">
      <label class="field-label">Логин</label>
      <input type="text" id="loginUser" class="field-input" value="admin" placeholder="Имя пользователя">
    </div>
    <div class="field-wrap">
      <label class="field-label">Пароль</label>
      <input type="password" id="loginPass" class="field-input" placeholder="••••••••">
    </div>
    <button class="btn-primary" onclick="doLogin()">Войти</button>
    <div class="login-error" id="loginErr">Неверный логин или пароль</div>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="brand-icon">
          <i data-lucide="utensils" style="width:16px;height:16px"></i>
        </div>
        <span class="brand-name">FastFood Admin</span>
      </div>
      <div class="header-right">
        <div class="live-badge">
          <div class="live-dot"></div>
          LIVE
        </div>

<script>
const API = '';
let token = localStorage.getItem('ff_token') || '';
let allOrders = [];
let currentFilter = 'all';
let currentOrderId = null;
let autoRefresh = null;
let soundEnabled = localStorage.getItem('ff_sound') !== 'false';
let prevNewCount = 0;
let categories = [];

// ── AUDIO ──
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playNotif() {
  if (!soundEnabled) return;
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.setValueAtTime(880, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1100, audioCtx.currentTime + 0.1);
    g.gain.setValueAtTime(0.08, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
    o.start(); o.stop(audioCtx.currentTime + 0.4);
  } catch(e) {}
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  localStorage.setItem('ff_sound', soundEnabled);
  const btn = document.getElementById('soundBtn');
  btn.classList.toggle('muted', !soundEnabled);
  btn.innerHTML = soundEnabled
    ? '<i data-lucide="volume-2" style="width:14px;height:14px"></i>'
    : '<i data-lucide="volume-x" style="width:14px;height:14px"></i>';
  lucide.createIcons();
}

// ── TIME ──
function timeAgo(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'только что';
  if (diff < 3600) return Math.floor(diff/60) + ' мин назад';
  if (diff < 86400) return Math.floor(diff/3600) + ' ч назад';
  return d.toLocaleDateString('ru');
}

// ── ANIMATE NUMBER ──
function animateNum(el, target) {
  const start = 0;
  const dur = 800;
  const t0 = performance.now();
  const fmt = n => n >= 1000 ? (n/1000).toFixed(0)+'K' : n;
  function step(t) {
    const p = Math.min((t - t0) / dur, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    el.textContent = fmt(Math.round(start + (target - start) * ease));
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ── AUTH ──
async function doLogin() {
  const u = document.getElementById('loginUser').value;
  const p = document.getElementById('loginPass').value;
  const err = document.getElementById('loginErr');
  err.style.display = 'none';
  try {
    const fd = new FormData();
    fd.append('username', u);
    fd.append('password', p);
    const r = await fetch(`${API}/api/login`, { method: 'POST', body: fd });
    if (!r.ok) throw new Error();
    const d = await r.json();
    token = d.access_token;
    localStorage.setItem('ff_token', token);
    showApp();
  } catch { err.style.display = 'block'; }
}

function doLogout() {
  token = '';
  localStorage.removeItem('ff_token');
  clearInterval(autoRefresh);
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

// ── INIT ──
function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  lucide.createIcons();
  loadOrders();
  loadMenu();
  autoRefresh = setInterval(() => {
    loadOrders();
  }, 15000);
  if (!soundEnabled) {
    document.getElementById('soundBtn').classList.add('muted');
    document.getElementById('soundBtn').innerHTML = '<i data-lucide="volume-x" style="width:14px;height:14px"></i>';
    lucide.createIcons();
  }
}

if (token) showApp();

// ── KEYBOARD SHORTCUTS ──
document.addEventListener('keydown', e => {
  if (e.key === '1') showPage('orders', document.querySelector('[data-page=orders]'));
  if (e.key === '2') showPage('menu', document.querySelector('[data-page=menu]'));
  if (e.key === '3') showPage('stats', document.querySelector('[data-page=stats]'));
  if (e.key === 'Escape') {
    closeModal('order'); closeModal('category'); closeModal('product');
  }
});

// ── NAVIGATION ──
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'stats') renderStats();
}

// ── ORDERS ──
function showSkeleton() {
  const list = document.getElementById('ordersList');
  list.innerHTML = [1,2,3].map(() => `
    <div class="skeleton-card">
      <div class="skeleton" style="height:12px;width:30%;margin-bottom:12px"></div>
      <div class="skeleton" style="height:14px;width:60%;margin-bottom:8px"></div>
      <div class="skeleton" style="height:12px;width:40%"></div>
    </div>
  `).join('');
}

async function loadOrders() {
  if (!token) return;
  if (allOrders.length === 0) showSkeleton();
  try {
    const r = await fetch(`${API}/api/orders`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!r.ok) { if (r.status === 401) doLogout(); return; }
    const data = await r.json();

    const newCount = data.filter(o => o.status === 'new').length;
    if (newCount > prevNewCount && allOrders.length > 0) playNotif();
    prevNewCount = newCount;

    const badge = document.getElementById('newOrdersBadge');
    badge.textContent = newCount;
    badge.classList.toggle('visible', newCount > 0);

    allOrders = data;
    renderOrders();
    renderStats();
  } catch(e) {}
}

function renderOrders() {
  const list = document.getElementById('ordersList');
  const filtered = currentFilter === 'all'
    ? allOrders
    : allOrders.filter(o => o.status === currentFilter);

  if (!filtered.length) {
    list.innerHTML = `
      <div class="empty-state">
        <svg class="empty-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="12" y="8" width="40" height="48" rx="4"/>
          <line x1="22" y1="22" x2="42" y2="22"/>
          <line x1="22" y1="30" x2="42" y2="30"/>
          <line x1="22" y1="38" x2="34" y2="38"/>
        </svg>
        <div class="empty-title">Заказов нет</div>
        <div class="empty-sub">Новые заказы появятся здесь</div>
      </div>`;
    return;
  }

  const statusMap = {
    new: ['badge-new','Новый'],
    accepted: ['badge-accepted','Принят'],
    preparing: ['badge-preparing','Готовится'],
    ready: ['badge-ready','Готов'],
    delivering: ['badge-delivering','Доставляется'],
    completed: ['badge-completed','Выполнен'],
    cancelled: ['badge-cancelled','Отменён']
  };

  const now = Date.now();
  list.innerHTML = filtered.map((o, i) => {
    const [badgeClass, badgeText] = statusMap[o.status] || ['badge-new','Новый'];
    const created = new Date(o.created_at);
    const isRecentNew = o.status === 'new' && (now - created.getTime()) < 10000;
    const items = o.items || [];
    const itemsText = items.slice(0,2).map(it => it.product?.name || '').filter(Boolean).join(', ') + (items.length > 2 ? ` +${items.length-2}` : '');
    return `
      <div class="order-card status-${o.status} ${isRecentNew ? 'is-new-pulse' : ''}"
           style="animation-delay:${i*40}ms"
           onclick="openOrder(${o.id})">
        <div class="order-header">
          <span class="order-id">Заказ #${o.id}</span>
          <span class="order-time">${timeAgo(o.created_at)}</span>
        </div>
        <div class="order-customer">${o.customer_name || 'Гость'}</div>
        <div class="order-details">${o.phone || ''} ${itemsText ? '· ' + itemsText : ''}</div>
        <div class="order-footer">
          <span class="order-total">${(o.total_price||0).toLocaleString()} сум</span>
          <span class="status-badge ${badgeClass}">${badgeText}</span>
        </div>
      </div>`;
  }).join('');
}

function filterOrders(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

// ── ORDER DETAIL ──
function openOrder(id) {
  const o = allOrders.find(x => x.id === id);
  if (!o) return;
  currentOrderId = id;
  const statusNames = {
    new:'Новый', accepted:'Принят', preparing:'Готовится',
    ready:'Готов', delivering:'Доставляется', completed:'Выполнен', cancelled:'Отменён'
  };
  document.getElementById('orderModalTitle').textContent = `Заказ #${o.id}`;
  document.getElementById('orderModalInfo').innerHTML = `
    <div class="order-info-row"><span class="order-info-key">Клиент</span><span class="order-info-val">${o.customer_name||'—'}</span></div>
    <div class="order-info-row"><span class="order-info-key">Телефон</span><span class="order-info-val">${o.phone||'—'}</span></div>
    <div class="order-info-row"><span class="order-info-key">Доставка</span><span class="order-info-val">${o.delivery_type==='delivery'?'Доставка':'Самовывоз'}</span></div>
    ${o.address ? `<div class="order-info-row"><span class="order-info-key">Адрес</span><span class="order-info-val">${o.address}</span></div>` : ''}
    ${o.comment ? `<div class="order-info-row"><span class="order-info-key">Комментарий</span><span class="order-info-val">${o.comment}</span></div>` : ''}
    <div class="order-info-row"><span class="order-info-key">Оплата</span><span class="order-info-val">${o.payment_method||'—'}</span></div>
  `;
  const items = o.items || [];
  document.getElementById('orderModalItems').innerHTML = `
    <div style="font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--ink-60);margin-bottom:8px">Состав</div>
    ${items.map(it => `
      <div class="order-item-row">
        <span>${it.product?.name||'Блюдо'} × ${it.quantity}</span>
        <span style="font-weight:600">${((it.price||0)*it.quantity).toLocaleString()} сум</span>
      </div>`).join('')}
    <div class="order-item-row" style="font-weight:700;font-size:14px">
      <span>Итого</span>
      <span>${(o.total_price||0).toLocaleString()} сум</span>
    </div>
  `;
  document.getElementById('orderStatusSelect').value = o.status;
  document.getElementById('orderModal').classList.add('open');
}

async function saveOrderStatus() {
  const status = document.getElementById('orderStatusSelect').value;
  try {
    const r = await fetch(`${API}/api/orders/${currentOrderId}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ status })
    });
    if (r.ok) { closeModal('order'); loadOrders(); }
  } catch(e) {}
}

// ── MENU ──
async function loadMenu() {
  try {
    const r = await fetch(`${API}/api/menu`);
    const data = await r.json();
    categories = data;
    renderMenu(data);
    const sel = document.getElementById('prodCat');
    sel.innerHTML = data.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  } catch(e) {}
}

function renderMenu(data) {
  const el = document.getElementById('menuList');
  if (!data.length) {
    el.innerHTML = `
      <div class="empty-state">
        <svg class="empty-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="32" cy="32" r="20"/>
          <line x1="32" y1="22" x2="32" y2="42"/>
          <line x1="22" y1="32" x2="42" y2="32"/>
        </svg>
        <div class="empty-title">Меню пусто</div>
        <div class="empty-sub">Добавьте категорию, затем блюда</div>
      </div>`;
    return;
  }
  el.innerHTML = data.map((cat, ci) => `
    <div class="category-block" style="animation-delay:${ci*60}ms">
      <div class="category-title">
        <span>${cat.name}</span>
        <button class="icon-btn danger" onclick="deleteCategory(${cat.id})" title="Удалить категорию">
          <i data-lucide="trash-2" style="width:12px;height:12px"></i>
        </button>
      </div>
      <div class="products-grid">
        ${(cat.products||[]).map((p, pi) => `
          <div class="product-card" style="animation-delay:${(ci*5+pi)*40}ms">
            <div class="product-img">
              ${p.image_url ? `<img src="${p.image_url}" alt="${p.name}" onerror="this.parentElement.innerHTML='<i data-lucide=\\"utensils\\" style=\\"width:20px;height:20px\\"></i>';lucide.createIcons()">` :
              '<i data-lucide="utensils" style="width:20px;height:20px"></i>'}
            </div>
            <div class="product-info">
              <div class="product-name">${p.name}</div>
              <div class="product-desc">${p.description||''}</div>
              <div class="product-footer">
                <span class="product-price">${(p.price||0).toLocaleString()} сум</span>
                <div class="product-actions">
                  <button class="icon-btn danger" onclick="deleteProduct(${p.id})" title="Удалить">
                    <i data-lucide="trash-2" style="width:12px;height:12px"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
  lucide.createIcons();
}

// ── STATS ──
function renderStats() {
  const total = allOrders.length;
  const revenue = allOrders.filter(o => o.status === 'completed').reduce((s,o) => s + (o.total_price||0), 0);
  const newC = allOrders.filter(o => o.status === 'new').length;
  const completed = allOrders.filter(o => o.status === 'completed').length;
  const today = allOrders.filter(o => {
    const d = new Date(o.created_at);
    const n = new Date();
    return d.toDateString() === n.toDateString();
  }).length;

  animateNum(document.getElementById('statTotal'), total);
  animateNum(document.getElementById('statRevenue'), Math.round(revenue/1000));
  document.querySelector('#statRevenue').nextElementSibling.textContent = 'тыс. сум';
  animateNum(document.getElementById('statNew'), newC);
  animateNum(document.getElementById('statCompleted'), completed);
  animateNum(document.getElementById('statToday'), today);
}

// ── MODALS ──
function openModal(type) {
  if (type === 'category') {
    document.getElementById('catName').value = '';
    document.getElementById('catSort').value = '0';
    document.getElementById('categoryModal').classList.add('open');
  } else if (type === 'product') {
    document.getElementById('prodName').value = '';
    document.getElementById('prodDesc').value = '';
    document.getElementById('prodPrice').value = '';
    document.getElementById('prodImg').value = '';
    document.getElementById('productModal').classList.add('open');
  }
}

function closeModal(type) {
  document.getElementById(type + 'Modal').classList.remove('open');
  if (type === 'order') currentOrderId = null;
}

// ── SAVE CATEGORY ──
async function saveCategory() {
  const name = document.getElementById('catName').value.trim();
  const sort = parseInt(document.getElementById('catSort').value) || 0;
  if (!name) return;
  try {
    const r = await fetch(`${API}/api/categories`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ name, sort_order: sort, is_active: true })
    });
    if (r.ok) { closeModal('category'); loadMenu(); }
  } catch(e) {}
}

// ── SAVE PRODUCT ──
async function saveProduct() {
  const name = document.getElementById('prodName').value.trim();
  const desc = document.getElementById('prodDesc').value.trim();
  const price = parseFloat(document.getElementById('prodPrice').value) || 0;
  const img = document.getElementById('prodImg').value.trim();
  const catId = parseInt(document.getElementById('prodCat').value);
  if (!name || !catId) return;
  try {
    const r = await fetch(`${API}/api/products`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({
        name, description: desc, price,
        image_url: img || null,
        category_id: catId,
        is_available: true,
        is_popular: false,
        sort_order: 0,
        options: []
      })
    });
    if (r.ok) { closeModal('product'); loadMenu(); }
  } catch(e) {}
}

// ── DELETE ──
async function deleteCategory(id) {
  if (!confirm('Удалить категорию?')) return;
  try {
    await fetch(`${API}/api/categories/${id}`, {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${token}` }
    });
    loadMenu();
  } catch(e) {}
}

async function deleteProduct(id) {
  if (!confirm('Удалить блюдо?')) return;
  try {
    await fetch(`${API}/api/products/${id}`, {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${token}` }
    });
    loadMenu();
  } catch(e) {}
}

// Enter key for login
document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
